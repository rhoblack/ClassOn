<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassOn — 수업 피드백</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    body {
      min-height: 100vh;
      background: var(--surface);
      display: flex;
      flex-direction: column;
    }

    .student-header {
      background: var(--background);
      border-bottom: 1px solid var(--border);
      padding: var(--gap-md) var(--gap-lg);
      text-align: center;
      position: relative;
    }

    .student-header h1 { font-size: 18px; font-weight: 700; }
    .student-header h1 span { color: var(--primary); }
    .student-greeting { font-size: 14px; color: var(--text-sub); margin-top: 4px; }
    .about-btn {
      position: absolute;
      top: 50%; right: var(--gap-lg);
      transform: translateY(-50%);
      background: none; border: none;
      font-size: 18px; cursor: pointer;
      color: var(--text-sub); padding: 4px;
      border-radius: 50%; line-height: 1;
    }
    .about-btn:hover { background: var(--border); color: var(--text); }
    .about-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .about-modal-overlay.open { display: flex; }
    .about-modal {
      background: var(--background);
      border-radius: var(--radius-lg);
      padding: var(--gap-lg);
      max-width: 360px; width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .about-modal-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: var(--gap-md);
    }
    .about-modal-title { font-size: var(--font-sub); font-weight: 700; }
    .about-modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 16px; color: var(--text-sub); padding: 2px 6px;
    }


    /* 공지 */
    .notice-box {
      margin: var(--gap-sm) var(--gap-md);
      padding: var(--gap-md);
      background: var(--primary-light);
      border: 1px solid #93c5fd;
      border-radius: var(--radius-lg);
      font-size: 14px;
      display: none;
    }
    .notice-box.show { display: block; }
    .notice-title { font-weight: 700; color: var(--primary); margin-bottom: 6px; font-size: 12px; }
    .notice-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--primary);
      text-decoration: underline;
      margin-top: 4px;
      font-size: 13px;
    }

    /* 피드백 버튼 */
    .feedback-section {
      padding: var(--gap-md) var(--gap-lg);
      flex: 1;
    }

    .feedback-prompt {
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: var(--gap-md);
    }

    .feedback-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--gap-md);
      max-width: 400px;
      margin: 0 auto var(--gap-md);
    }

    .feedback-btn {
      aspect-ratio: 1;
      border: 3px solid transparent;
      border-radius: var(--radius-lg);
      background: var(--background);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all .15s;
      box-shadow: var(--shadow-sm);
    }
    .feedback-btn:hover { transform: scale(1.03); box-shadow: var(--shadow-md); }
    .feedback-btn.selected {
      border-color: currentColor;
      transform: scale(1.06);
      box-shadow: var(--shadow-md);
    }
    .fb-emoji { font-size: 36px; line-height: 1; }
    .fb-label { font-size: 14px; font-weight: 700; }
    .fb-selected-msg {
      text-align: center;
      font-size: 12px;
      color: var(--text-sub);
      min-height: 18px;
    }

    /* 하단 액션 */
    .action-section {
      padding: 0 var(--gap-lg) var(--gap-md);
      display: flex;
      flex-direction: column;
      gap: var(--gap-sm);
      max-width: 440px;
      margin: 0 auto;
      width: 100%;
    }

    .action-btn {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--gap-sm);
      border: 2px solid var(--border);
      background: var(--background);
      transition: all .15s;
    }
    .action-btn:hover { border-color: var(--primary); background: var(--primary-light); }
    .action-btn.question-btn:hover { border-color: #8b5cf6; background: #f5f3ff; }
    .action-btn.help-btn:hover     { border-color: #f59e0b; background: #fffbeb; }
    .action-btn.clear-btn          { border-style: dashed; color: var(--text-sub); }
    .action-btn.clear-btn:hover    { border-color: #94a3b8; background: #f1f5f9; color: var(--text); }
    .action-btn.clear-btn.active   { border-color: #94a3b8; background: #f1f5f9; color: var(--text); border-style: solid; }

    /* 퀴즈 패널 */
    .quiz-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .quiz-panel.open { display: flex; }

    .quiz-box {
      background: var(--background);
      border-radius: var(--radius-lg);
      padding: var(--gap-xl);
      width: 90%;
      max-width: 500px;
      box-shadow: var(--shadow-lg);
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--gap-lg);
    }

    .quiz-timer {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
    }
    .quiz-timer.urgent { color: #ef4444; }

    .quiz-question {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: var(--gap-lg);
      line-height: 1.6;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: var(--gap-sm);
    }

    .quiz-option {
      padding: 14px var(--gap-md);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 14px;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: var(--gap-sm);
    }
    .quiz-option:hover { border-color: var(--primary); background: var(--primary-light); }
    .quiz-option.selected { border-color: var(--primary); background: var(--primary); color: #fff; }
    .quiz-option.submitted { pointer-events: none; opacity: .7; }
    .opt-letter {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px;
      flex-shrink: 0;
    }
    .quiz-option.selected .opt-letter { background: rgba(255,255,255,.3); }

    .quiz-ox { display: flex; gap: var(--gap-lg); }
    .quiz-ox-btn {
      flex: 1;
      aspect-ratio: 1;
      max-height: 140px;
      font-size: 48px;
      border: 3px solid var(--border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .quiz-ox-btn:hover { transform: scale(1.05); }
    .quiz-ox-btn.selected.o { border-color: #10B981; background: #ecfdf5; }
    .quiz-ox-btn.selected.x { border-color: #ef4444; background: #fef2f2; }

    .quiz-submitted-msg {
      text-align: center;
      padding: var(--gap-md);
      color: var(--color-good);
      font-weight: 700;
      font-size: 16px;
    }

    /* 질문 입력 패널 */
    .question-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 1500;
      align-items: flex-end;
      justify-content: center;
    }
    .question-panel.open { display: flex; }
    .question-box {
      background: var(--background);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: var(--gap-lg);
      width: 100%;
      max-width: 600px;
    }
    .question-box h3 { font-size: 16px; font-weight: 700; margin-bottom: var(--gap-md); }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div class="student-header">
    <h1>Class<span>On</span></h1>
    <div class="student-greeting" id="greeting">안녕하세요!</div>
    <button id="noticeReopenBtn" onclick="reopenNotice()"
            style="display:none;background:var(--primary-light);border:1px solid #93c5fd;border-radius:var(--radius-md);padding:4px 10px;font-size:12px;cursor:pointer;color:var(--primary);font-weight:600">
      📢 공지 보기
    </button>
    <button class="about-btn" onclick="document.getElementById('aboutModal').classList.add('open')" title="만든이 정보">ℹ️</button>
  </div>

  <!-- 만든이 정보 모달 -->
  <div class="about-modal-overlay" id="aboutModal" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="about-modal">
      <div class="about-modal-header">
        <div class="about-modal-title">👤 만든이 정보</div>
        <button class="about-modal-close" onclick="document.getElementById('aboutModal').classList.remove('open')">✕</button>
      </div>
      <div style="display:flex;align-items:center;gap:var(--gap-md);margin-bottom:var(--gap-md)">
        <div style="width:48px;height:48px;border-radius:50%;background:var(--primary-light);border:2px solid var(--primary);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">👨‍💻</div>
        <div>
          <div style="font-weight:700;font-size:var(--font-sub)">노진호</div>
          <div style="color:var(--text-sub);font-size:var(--font-caption)">진현테크 대표</div>
          <a href="mailto:rhoblack@gmail.com" style="font-size:var(--font-caption);color:var(--primary);text-decoration:none">rhoblack@gmail.com</a>
        </div>
        <span style="margin-left:auto;background:var(--primary);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;flex-shrink:0">v0.1.19</span>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:var(--gap-md)">
        <div style="font-size:var(--font-caption);font-weight:700;color:var(--text-sub);margin-bottom:6px">이력</div>
        <ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:4px;font-size:var(--font-caption)">
          <li style="display:flex;gap:6px"><span style="color:var(--text-sub);flex-shrink:0">전</span><span>삼성전자 책임 연구원</span></li>
          <li style="display:flex;gap:6px"><span style="color:var(--text-sub);flex-shrink:0">전</span><span>대한상공회의소 정규직 교수</span></li>
          <li style="display:flex;gap:6px"><span style="color:var(--primary);font-weight:700;flex-shrink:0">현</span><span>진현테크 대표 · 시스템 반도체 설계 및 검증, 임베디드 시스템, 전자 분야 실무 교육 강사</span></li>
        </ul>
      </div>
    </div>
  </div>

  <!-- 공지 -->
  <div class="notice-box" id="noticeBox">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div class="notice-title" style="margin-bottom:0">📢 강사 공지</div>
      <button onclick="document.getElementById('noticeBox').classList.remove('show'); document.getElementById('noticeReopenBtn').style.display=''"
              style="background:none;border:none;cursor:pointer;color:var(--text-sub);font-size:16px;line-height:1;padding:0">✕</button>
    </div>
    <div id="noticeText"></div>
    <div id="noticeLinks"></div>
  </div>

  <!-- 피드백 버튼 -->
  <div class="feedback-section">
    <div class="feedback-prompt">지금 수업 어떠세요?</div>
    <div class="feedback-buttons" id="feedbackButtons">
      <!-- 버튼은 JS에서 동적 생성 -->
    </div>
  </div>

  <!-- 하단 액션 버튼 -->
  <div class="action-section">
    <button class="action-btn clear-btn" id="clearStateBtn" onclick="clearMyState()">
      ⬜ 상태 지우기
    </button>
    <button class="action-btn question-btn" onclick="openQuestionPanel()">
      💬 질문 남기기
    </button>
    <button class="action-btn help-btn" onclick="sendHelpRequest()" style="display:none">
      🙋 도움 요청하기
    </button>
  </div>

  <!-- 퀴즈 패널 -->
  <div class="quiz-panel" id="quizPanel">
    <div class="quiz-box">
      <div class="quiz-header">
        <span style="font-weight:700;font-size:16px">📝 퀴즈</span>
        <span class="quiz-timer" id="quizTimer">0:30</span>
      </div>
      <div class="quiz-question" id="quizQuestion"></div>
      <div id="quizAnswers"></div>
      <div class="quiz-submitted-msg" id="quizSubmittedMsg" style="display:none">
        ✅ 응답이 제출되었습니다!<br>
        <span style="font-size:13px;font-weight:400;color:var(--text-sub)" id="quizWaitMsg"></span>
      </div>
      <button class="btn btn-primary" id="quizNextBtn" onclick="quizSetNext()"
              style="display:none;width:100%;margin-top:var(--gap-md)">다음 문제 ▶</button>
    </div>
  </div>

  <!-- 익명 질문 패널 -->
  <div class="question-panel" id="questionPanel">
    <div class="question-box">
      <h3>💬 질문</h3>
      <textarea id="questionText" class="textarea" style="min-height:100px" placeholder="질문을 입력하세요. 강사 화면에 이름과 함께 표시됩니다."></textarea>
      <div class="flex gap-sm" style="justify-content:flex-end;margin-top:var(--gap-md)">
        <button class="btn btn-secondary" onclick="closeQuestionPanel()">취소</button>
        <button class="btn btn-primary" onclick="sendQuestion()">전송</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/socket-client.js"></script>
  <script>
    // ─── 학생 정보 (로컬스토리지에서 로드) ───────────────────
    const enrollmentId = localStorage.getItem('studentEnrollmentId');
    const studentName  = localStorage.getItem('studentName');
    const courseId     = localStorage.getItem('studentCourseId');

    // 정보 없으면 이름 선택 화면으로
    if (!enrollmentId || !studentName || !courseId) {
      window.location.href = '/student';
    }

    // ─── 상태 ────────────────────────────────────────────────
    let activeButtonSet = null;
    let selectedButtonIdx = null;
    let activeQuizSessionId = null;
    let quizTimerInterval = null;
    let quizTimerLeft = 0;
    let quizAnswered = false;
    let quizSet = [];
    let quizSetCurrentIdx = 0;

    // ─── 초기화 ──────────────────────────────────────────────
    async function init() {
      document.getElementById('greeting').textContent = `안녕하세요, ${studentName}님! 👋`;

      // 버튼 세트 로드
      await loadButtonSet();

      // Socket 연결
      SocketClient.connect();
      SocketClient.joinAsStudent(enrollmentId, courseId);
      // 재연결 시 자동 재입장 (소켓 끊겼다 재연결되면 서버 메모리에서 사라지므로)
      SocketClient.onReconnect(() => {
        SocketClient.joinAsStudent(enrollmentId, courseId);
      });
      setupSocketHandlers();
    }

    // ─── 피드백 버튼 세트 로드 ──────────────────────────────
    async function loadButtonSet() {
      const res = await API.get(`/api/button-sets?course_id=${courseId}`);
      if (!res || !res.success || res.data.length === 0) {
        // 기본 세트 사용
        renderFeedbackButtons([
          { emoji: '😊', label: '잘됨',  color: '#10B981' },
          { emoji: '🤔', label: '애매',  color: '#F59E0B' },
          { emoji: '😵', label: '모름',  color: '#EF4444' },
          { emoji: '✋', label: '질문',  color: '#2563EB' },
        ], null);
        return;
      }

      activeButtonSet = res.data[0];
      renderFeedbackButtons(activeButtonSet.buttons, activeButtonSet.id);
    }

    // ─── 피드백 버튼 렌더링 ─────────────────────────────────
    function renderFeedbackButtons(buttons, setId) {
      const container = document.getElementById('feedbackButtons');
      container.innerHTML = buttons.map((btn, i) => `
        <button
          class="feedback-btn"
          style="color:${btn.color}"
          onclick="sendFeedback(${i}, '${escHtml(btn.color)}', '${escHtml(btn.emoji || '')}', '${escHtml(btn.label)}', ${setId})"
          id="fb_btn_${i}"
        >
          <span class="fb-emoji">${btn.emoji || '●'}</span>
          <span class="fb-label">${escHtml(btn.label)}</span>
        </button>
      `).join('');

      // 버튼이 3개 이하면 그리드 조정
      if (buttons.length <= 3) {
        container.style.gridTemplateColumns = `repeat(${buttons.length}, 1fr)`;
      } else {
        container.style.gridTemplateColumns = 'repeat(2, 1fr)';
      }
    }

    // ─── 피드백 전송 ─────────────────────────────────────────
    function sendFeedback(index, color, emoji, label, setId) {
      // 전송 중 표시 (버튼 비활성화)
      document.querySelectorAll('.feedback-btn').forEach(btn => {
        btn.disabled = true;
        btn.style.opacity = '0.6';
      });

      // Socket 전송 — 서버 확인 응답 후 UI 업데이트
      SocketClient.sendFeedback(enrollmentId, courseId, setId, index, color, emoji, label, () => {
        // 서버 확인 완료 → UI 업데이트
        selectedButtonIdx = index;
        document.getElementById('clearStateBtn').classList.remove('active');
        document.querySelectorAll('.feedback-btn').forEach(btn => {
          btn.disabled = false;
          btn.style.opacity = '';
          btn.classList.remove('selected');
        });
        document.getElementById(`fb_btn_${index}`)?.classList.add('selected');
      });

      // 재시도 포함 최대 1.5초 대기 후에도 응답 없으면 버튼 복원
      setTimeout(() => {
        document.querySelectorAll('.feedback-btn').forEach(btn => {
          btn.disabled = false;
          btn.style.opacity = '';
        });
      }, 1800); // 0.5초 × 3회 + 여유
    }

    // ─── 공지 표시 ───────────────────────────────────────────
    let lastNotice = null; // 마지막 공지 저장

    function showNotice(text, links) {
      lastNotice = { text, links };
      const box  = document.getElementById('noticeBox');
      const textEl  = document.getElementById('noticeText');
      const linksEl = document.getElementById('noticeLinks');

      // URL을 클릭 가능한 링크로 자동 변환
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      textEl.innerHTML = escHtml(text).replace(urlRegex,
        '<a href="$1" target="_blank" rel="noopener" class="notice-link">$1</a>');
      linksEl.innerHTML = (links || []).map(l =>
        `<a href="${escHtml(l.url)}" target="_blank" rel="noopener" class="notice-link">🔗 ${escHtml(l.label)}</a>`
      ).join('');
      document.getElementById('noticeReopenBtn').style.display = 'none';

      box.classList.add('show');
    }

    function reopenNotice() {
      if (!lastNotice) return;
      document.getElementById('noticeBox').classList.add('show');
      document.getElementById('noticeReopenBtn').style.display = 'none';
    }

    // ─── 퀴즈 처리 ───────────────────────────────────────────
    function startQuiz(data) {
      const { sessionId, type, question, options, timeLimit } = data;
      activeQuizSessionId = sessionId;
      quizAnswered = false;

      document.getElementById('quizQuestion').textContent = question;
      document.getElementById('quizSubmittedMsg').style.display = 'none';
      document.getElementById('quizWaitMsg').textContent = '';
      document.getElementById('quizNextBtn').style.display = 'none';

      // 보기 렌더링
      const answersEl = document.getElementById('quizAnswers');
      if (type === 'ox') {
        answersEl.innerHTML = `
          <div class="quiz-ox">
            <button class="quiz-ox-btn o" onclick="submitQuizAnswer('O', this)">⭕</button>
            <button class="quiz-ox-btn x" onclick="submitQuizAnswer('X', this)">❌</button>
          </div>
        `;
      } else {
        const letters = ['A','B','C','D'];
        answersEl.innerHTML = `
          <div class="quiz-options">
            ${(options || []).map((opt, i) => `
              <button class="quiz-option" onclick="submitQuizAnswer('${letters[i]}', this)">
                <span class="opt-letter">${letters[i]}</span>
                ${escHtml(opt)}
              </button>
            `).join('')}
          </div>
        `;
      }

      // 타이머 시작
      quizTimerLeft = timeLimit || 30;
      updateQuizTimer();
      clearInterval(quizTimerInterval);
      quizTimerInterval = setInterval(() => {
        quizTimerLeft--;
        updateQuizTimer();
        if (quizTimerLeft <= 0) {
          clearInterval(quizTimerInterval);
          endQuizPanel();
        }
      }, 1000);

      // 퀴즈 패널 열기
      document.getElementById('quizPanel').classList.add('open');
    }

    function updateQuizTimer() {
      const m = Math.floor(quizTimerLeft / 60);
      const s = quizTimerLeft % 60;
      const el = document.getElementById('quizTimer');
      el.textContent = `${m}:${String(s).padStart(2, '0')}`;
      el.classList.toggle('urgent', quizTimerLeft <= 10);
    }

    function submitQuizAnswer(answer, btnEl) {
      if (quizAnswered) return;
      quizAnswered = true;

      // 버튼 비활성화 및 선택 표시
      document.querySelectorAll('.quiz-option, .quiz-ox-btn').forEach(b => {
        b.classList.add('submitted');
      });
      btnEl.classList.add('selected');

      // Socket 전송
      SocketClient.sendQuizAnswer(activeQuizSessionId, enrollmentId, answer);

      // 제출 메시지
      if (quizSet.length > 1) {
        // 배치 모드: 다음 문제 버튼 표시
        if (quizSetCurrentIdx < quizSet.length - 1) {
          const btn = document.getElementById('quizNextBtn');
          btn.textContent = `다음 문제 ▶ (${quizSetCurrentIdx + 2}/${quizSet.length})`;
          btn.style.display = 'block';
        } else {
          document.getElementById('quizWaitMsg').textContent = '모든 문제를 완료했습니다! 🎉';
          document.getElementById('quizSubmittedMsg').style.display = 'block';
        }
      } else {
        document.getElementById('quizWaitMsg').textContent = '강사가 다음 문제를 출제할 때까지 기다려주세요.';
        document.getElementById('quizSubmittedMsg').style.display = 'block';
      }
    }

    function endQuizPanel(data) {
      // 다른 세션의 quiz-end 이벤트가 현재 세션 패널을 닫지 않도록 세션 ID 확인
      if (data && data.sessionId && activeQuizSessionId && data.sessionId != activeQuizSessionId) return;
      clearInterval(quizTimerInterval);
      document.getElementById('quizPanel').classList.remove('open');
      activeQuizSessionId = null;
      quizSet = [];
      quizSetCurrentIdx = 0;
    }

    // ─── 퀴즈 세트 처리 (다중문제 배치) ─────────────────────────
    function startQuizSet(data) {
      quizSet = data.quizSet;
      quizSetCurrentIdx = 0;
      showQuizSetQuestion(0);
      document.getElementById('quizPanel').classList.add('open');
    }

    function showQuizSetQuestion(idx) {
      const q = quizSet[idx];
      activeQuizSessionId = q.sessionId;
      quizAnswered = false;

      // 헤더 진행 표시 업데이트
      const headerTitle = document.querySelector('#quizPanel .quiz-header span:first-child');
      if (headerTitle) headerTitle.innerHTML = `📝 퀴즈 <span style="font-size:12px;opacity:.7">${idx + 1}/${quizSet.length}</span>`;

      document.getElementById('quizQuestion').textContent = q.question;
      document.getElementById('quizSubmittedMsg').style.display = 'none';
      document.getElementById('quizWaitMsg').textContent = '';
      document.getElementById('quizNextBtn').style.display = 'none';

      // 보기 렌더링
      const answersEl = document.getElementById('quizAnswers');
      if (q.type === 'ox') {
        answersEl.innerHTML = `
          <div class="quiz-ox">
            <button class="quiz-ox-btn o" onclick="submitQuizAnswer('O', this)">⭕</button>
            <button class="quiz-ox-btn x" onclick="submitQuizAnswer('X', this)">❌</button>
          </div>
        `;
      } else {
        const letters = ['A','B','C','D'];
        answersEl.innerHTML = `
          <div class="quiz-options">
            ${(q.options || []).map((opt, i) => `
              <button class="quiz-option" onclick="submitQuizAnswer('${letters[i]}', this)">
                <span class="opt-letter">${letters[i]}</span>
                ${escHtml(opt)}
              </button>
            `).join('')}
          </div>
        `;
      }

      // 타이머
      quizTimerLeft = q.timeLimit || 30;
      updateQuizTimer();
      clearInterval(quizTimerInterval);
      quizTimerInterval = setInterval(() => {
        quizTimerLeft--;
        updateQuizTimer();
        if (quizTimerLeft <= 0) {
          clearInterval(quizTimerInterval);
          // 시간 초과 시 자동 다음 문제 or 종료
          if (quizSetCurrentIdx < quizSet.length - 1) {
            quizSetCurrentIdx++;
            showQuizSetQuestion(quizSetCurrentIdx);
          } else {
            endQuizPanel({});
          }
        }
      }, 1000);
    }

    function quizSetNext() {
      quizSetCurrentIdx++;
      showQuizSetQuestion(quizSetCurrentIdx);
    }

    // ─── 익명 질문 ───────────────────────────────────────────
    function openQuestionPanel() {
      document.getElementById('questionPanel').classList.add('open');
      document.getElementById('questionText').value = '';
      setTimeout(() => document.getElementById('questionText').focus(), 100);
    }

    function closeQuestionPanel() {
      document.getElementById('questionPanel').classList.remove('open');
    }

    function sendQuestion() {
      const text = document.getElementById('questionText').value.trim();
      if (!text) { Toast.error('질문 내용을 입력해주세요.'); return; }

      SocketClient.sendQuestion(enrollmentId, courseId, text);
      Toast.success('질문이 전송되었습니다.');
      closeQuestionPanel();
    }

    // ─── 도움 요청 ───────────────────────────────────────────
    function sendHelpRequest() {
      SocketClient.sendHelpRequest(enrollmentId, courseId);
      Toast.success('도움 요청을 보냈습니다. 잠시만 기다려주세요.');
    }

    // ─── 상태 지우기 ─────────────────────────────────────────
    function clearMyState() {
      selectedButtonIdx = null;
      document.querySelectorAll('.feedback-btn').forEach(btn => btn.classList.remove('selected'));
      document.getElementById('clearStateBtn').classList.add('active');
      SocketClient.clearMyState();
    }

    function applyStateClear() {
      selectedButtonIdx = null;
      document.querySelectorAll('.feedback-btn').forEach(btn => btn.classList.remove('selected'));
      document.getElementById('clearStateBtn').classList.add('active');
    }

    // ─── Socket 이벤트 설정 ──────────────────────────────────
    function setupSocketHandlers() {
      SocketClient.onNotice((data) => showNotice(data.text, data.links));
      SocketClient.onQuizStart((data) => startQuiz(data));
      SocketClient.onQuizEnd((data) => endQuizPanel(data));
      SocketClient.socket.on('student:quiz-set-start', (data) => startQuizSet(data));
      SocketClient.socket.on('student:quiz-set-end', () => endQuizPanel({}));
      // 강사가 전체 초기화 시 내 상태도 초기화
      SocketClient.onStateClear(() => {
        applyStateClear();
        Toast.warning('강사가 전체 상태를 초기화했습니다.');
      });

      // 강사가 버튼 세트 변경 시 화면 업데이트
      SocketClient.onButtonSetChange((data) => {
        activeButtonSet = data.buttonSet;
        renderFeedbackButtons(data.buttonSet.buttons, data.buttonSet.id);
        applyStateClear();
        Toast.warning(`버튼이 "${data.buttonSet.name}"으로 변경되었습니다.`);
      });
    }

    // ─── 유틸 ───────────────────────────────────────────────
    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
    }

    init();
  </script>
</body>
</html>
