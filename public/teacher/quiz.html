<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassOn — 퀴즈</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .quiz-type-toggle {
      display: flex;
      gap: var(--gap-sm);
      margin-bottom: var(--gap-md);
    }
    .type-btn {
      padding: 8px 20px;
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface);
      cursor: pointer;
      font-size: var(--font-body);
      font-weight: 500;
      transition: all .15s;
    }
    .type-btn.active {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }

    .ox-buttons {
      display: flex;
      gap: var(--gap-md);
      margin-top: var(--gap-sm);
    }
    .ox-btn {
      flex: 1;
      padding: 20px;
      font-size: 32px;
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
      cursor: pointer;
      text-align: center;
      transition: all .15s;
    }
    .ox-btn.selected {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .ox-btn:first-child.selected { border-color: #10B981; background: #ecfdf5; }
    .ox-btn:last-child.selected  { border-color: #ef4444; background: #fef2f2; }

    .options-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: var(--gap-sm) var(--gap-md);
      align-items: center;
    }
    .option-label {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }
    .option-label.correct {
      background: #10B981; border-color: #10B981; color: #fff;
    }

    /* 퀴즈 결과 */
    .result-bar {
      margin-bottom: var(--gap-sm);
    }
    .result-bar-header {
      display: flex;
      align-items: center;
      gap: var(--gap-sm);
      margin-bottom: 4px;
      font-size: var(--font-caption);
    }
    .result-bar-track {
      height: 24px;
      background: var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .result-bar-fill {
      height: 100%;
      background: var(--primary);
      transition: width .5s;
      display: flex;
      align-items: center;
      padding-left: 8px;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
    }
    .result-bar-fill.correct { background: #10B981; }

    /* 문제은행 탭 */
    .question-bank-item {
      display: flex;
      align-items: center;
      gap: var(--gap-sm);
      padding: 8px var(--gap-md);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: var(--gap-sm);
      cursor: pointer;
      transition: all .15s;
    }
    .question-bank-item:hover { border-color: var(--primary); background: var(--primary-light); }
    .question-bank-item.selected { border-color: var(--primary); background: var(--primary-light); }

    /* 퀴즈 진행 중 패널 */
    .active-quiz-panel {
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius-lg);
      padding: var(--gap-lg);
      margin-bottom: var(--gap-lg);
    }
    .response-counter {
      font-size: 48px;
      font-weight: 700;
    }
    .timer-display {
      font-size: 32px;
      font-weight: 700;
    }
    .timer-display.urgent { color: #fca5a5; }
  </style>
</head>
<body>
  <div class="teacher-layout">
    <header class="topbar">
      <button class="btn-hamburger" onclick="toggleSidebar()" title="메뉴 접기/펼치기">☰</button>
      <div class="topbar-logo">Class<span>On</span></div>
      <div class="topbar-course" id="courseName">-</div>
      <button class="btn btn-secondary btn-sm" onclick="logout()">로그아웃</button>
    </header>

    <nav class="sidebar">
      <div class="sidebar-nav">
        <a href="/teacher/dashboard.html" class="sidebar-item">📋 과정 관리</a>
        <a href="/teacher/class.html"     class="sidebar-item">🖥️ 수업 진행</a>
        <a href="/teacher/students.html"  class="sidebar-item">👥 학생 관리</a>
        <a href="/teacher/quiz.html"      class="sidebar-item active">📝 퀴즈</a>
        <a href="/teacher/questions.html" class="sidebar-item">📚 문제 은행</a>
        <a href="/teacher/teams.html"     class="sidebar-item">🏃 팀 편성</a>
        <a href="/teacher/settings.html"  class="sidebar-item">⚙️ 설정</a>
      </div>
    </nav>

    <main class="main-content">
      <div style="display:flex;align-items:center;gap:var(--gap-md);margin-bottom:var(--gap-lg);flex-wrap:wrap">
        <h1 class="page-title" style="margin:0">📝 퀴즈 출제</h1>
        <label style="display:flex;align-items:center;gap:8px;font-size:var(--font-body);white-space:nowrap">
          ⏱ 제한시간
          <input type="number" id="timeLimit" class="input" value="30" min="5" max="300" style="width:80px;text-align:center"> 초
        </label>
      </div>

      <!-- 진행 중인 퀴즈 패널 (활성 시에만 표시) -->
      <div class="active-quiz-panel" id="activeQuizPanel" style="display:none">
        <div class="flex justify-between items-center">
          <div>
            <div style="font-size:12px;opacity:.8">진행 중인 퀴즈 <span id="quizProgress" style="background:rgba(255,255,255,.25);border-radius:999px;padding:1px 8px;margin-left:4px"></span></div>
            <div style="font-size:16px;font-weight:600;margin-top:4px" id="activeQuizQuestion"></div>
          </div>
          <div style="text-align:center">
            <div style="font-size:11px;opacity:.8">남은 시간</div>
            <div class="timer-display" id="timerDisplay">0:00</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:11px;opacity:.8">응답</div>
            <div class="response-counter"><span id="answeredCount">0</span>/<span id="totalCount">0</span></div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
            <button class="btn btn-danger" id="endQuizBtn" onclick="endQuiz()">퀴즈 종료</button>
            <button class="btn" id="nextQuizBtn" onclick="startNextQuiz()"
                    style="display:none;background:#fff;color:var(--primary);font-weight:700">다음 문제 ▶</button>
          </div>
        </div>
        <div id="liveDistribution" style="margin-top:var(--gap-md)"></div>
      </div>

      <!-- 탭 -->
      <div data-tabs>
        <div class="tabs">
          <button class="tab-btn active" data-tab="instant">📝 즉석 출제</button>
          <button class="tab-btn" data-tab="bank">📚 문제은행에서</button>
          <button class="tab-btn" data-tab="results">📊 결과 보기</button>
        </div>

        <!-- 즉석 출제 탭 -->
        <div class="tab-pane active" data-tab-pane="instant">
          <div class="quiz-type-toggle">
            <button class="type-btn active" id="oxBtn" onclick="setQuizType('ox')">OX 퀴즈</button>
            <button class="type-btn"        id="mcBtn" onclick="setQuizType('4choice')">4지선다</button>
          </div>

          <div class="form-group" style="margin-bottom:var(--gap-md)">
            <label class="form-label">문제 *</label>
            <textarea id="quizQuestion" class="textarea" placeholder="문제를 입력하세요"></textarea>
          </div>

          <!-- OX 정답 선택 -->
          <div id="oxAnswerSection">
            <label class="form-label">정답</label>
            <div class="ox-buttons">
              <button class="ox-btn" id="oxO" onclick="selectOx('O')">⭕ O</button>
              <button class="ox-btn" id="oxX" onclick="selectOx('X')">❌ X</button>
            </div>
          </div>

          <!-- 4지선다 보기 -->
          <div id="mcSection" style="display:none">
            <label class="form-label" style="margin-bottom:var(--gap-sm)">보기 (정답 클릭으로 선택)</label>
            <div class="options-grid" id="optionsGrid">
              <div class="option-label" id="optA" onclick="selectOption('A')">A</div>
              <input type="text" class="input" id="optAText" placeholder="보기 A">
              <div class="option-label" id="optB" onclick="selectOption('B')">B</div>
              <input type="text" class="input" id="optBText" placeholder="보기 B">
              <div class="option-label" id="optC" onclick="selectOption('C')">C</div>
              <input type="text" class="input" id="optCText" placeholder="보기 C">
              <div class="option-label" id="optD" onclick="selectOption('D')">D</div>
              <input type="text" class="input" id="optDText" placeholder="보기 D">
            </div>
          </div>

          <div class="flex gap-sm" style="margin-top:var(--gap-lg)">
            <button class="btn btn-secondary" onclick="saveToBank()">📚 문제은행 저장</button>
            <button class="btn btn-primary btn-lg" onclick="startQuiz()">▶ 퀴즈 시작</button>
          </div>
        </div>

        <!-- 문제은행 탭 -->
        <div class="tab-pane" data-tab-pane="bank">
          <div class="flex gap-sm" style="margin-bottom:var(--gap-md)">
            <select id="bankSubject" class="select" onchange="loadBankChapters()">
              <option value="">과목 선택</option>
            </select>
            <select id="bankChapter" class="select">
              <option value="">챕터 선택</option>
            </select>
            <select id="bankCount" class="select" style="width:100px">
              <option value="1">1문제</option>
              <option value="3" selected>3문제</option>
              <option value="5">5문제</option>
              <option value="10">10문제</option>
            </select>
            <button class="btn btn-secondary" onclick="loadBankQuestions()">불러오기</button>
          </div>

          <div id="bankQuestions"></div>

          <div class="flex gap-sm" style="margin-top:var(--gap-md)">
            <button class="btn btn-secondary" onclick="randomSelect()">🎲 랜덤 선택</button>
            <button class="btn btn-primary" onclick="startBankQuiz()">▶ 선택 퀴즈 시작</button>
          </div>
        </div>

        <!-- 결과 탭 -->
        <div class="tab-pane" data-tab-pane="results">
          <div id="quizResults">
            <p class="text-sub">퀴즈를 진행한 후 결과가 여기에 표시됩니다.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/socket-client.js"></script>
  <script>
    let courseId = getCurrentCourseId();
    let quizType = 'ox';
    let selectedAnswer = null;
    let activeSessionId = null;
    let summarySessionIds = [];
    let timerInterval = null;
    let timerLeft = 0;
    let bankQuestions = [];
    let selectedBankIds = new Set();
    let bankQuizQueue = [];
    let bankQuizCurrentIdx = 0;
    let batchSessionIds = [];
    let isBatchMode = false;

    async function init() {
      const course = await loadCurrentCourse();
      if (course) document.getElementById('courseName').textContent = `현재: ${course.name} ${course.cohort}`;
      await loadBankSubjects();
      SocketClient.connect();
      SocketClient.registerTeacher();

      SocketClient.onQuizAnswerUpdate((data) => {
        const isRelevant = isBatchMode
          ? batchSessionIds.includes(Number(data.sessionId))
          : data.sessionId == activeSessionId;
        if (!isRelevant) return;
        document.getElementById('answeredCount').textContent = data.answered;
        document.getElementById('totalCount').textContent = data.total;
        if (!isBatchMode) renderLiveDistribution(data.distribution);
      });
    }

    // ─── 퀴즈 유형 전환 ─────────────────────────────────────
    function setQuizType(type) {
      quizType = type;
      selectedAnswer = null;
      document.getElementById('oxBtn').classList.toggle('active', type === 'ox');
      document.getElementById('mcBtn').classList.toggle('active', type === '4choice');
      document.getElementById('oxAnswerSection').style.display = type === 'ox' ? 'block' : 'none';
      document.getElementById('mcSection').style.display     = type === '4choice' ? 'block' : 'none';
    }

    function selectOx(val) {
      selectedAnswer = val;
      document.getElementById('oxO').classList.toggle('selected', val === 'O');
      document.getElementById('oxX').classList.toggle('selected', val === 'X');
    }

    function selectOption(letter) {
      selectedAnswer = letter;
      ['A','B','C','D'].forEach(l => {
        document.getElementById(`opt${l}`).classList.toggle('correct', l === letter);
      });
    }

    // ─── 즉석 퀴즈 시작 ─────────────────────────────────────
    async function startQuiz() {
      const question = document.getElementById('quizQuestion').value.trim();
      const timeLimit = parseInt(document.getElementById('timeLimit').value) || 30;

      if (!question) { Toast.error('문제를 입력해주세요.'); return; }
      if (!selectedAnswer) { Toast.error('정답을 선택해주세요.'); return; }

      let options = null;
      if (quizType === '4choice') {
        options = ['A','B','C','D'].map(l => document.getElementById(`opt${l}Text`).value.trim());
        if (options.some(o => !o)) { Toast.error('보기를 모두 입력해주세요.'); return; }
      }

      // 퀴즈 생성
      const quizRes = await API.post('/api/quizzes', {
        course_id: courseId, type: quizType, question, options, answer: selectedAnswer,
        time_limit: timeLimit, source: 'instant',
      });
      if (!quizRes || !quizRes.success) { Toast.error('퀴즈 생성 실패'); return; }

      // 세션 시작
      const sessionRes = await API.post('/api/quiz-sessions', {
        quiz_id: quizRes.data.id, course_id: courseId,
      });
      if (!sessionRes || !sessionRes.success) { Toast.error('세션 시작 실패'); return; }

      activeSessionId = sessionRes.data.id;
      startTimer(timeLimit);
      showActivePanel(question, 0);
      Toast.success('퀴즈가 시작되었습니다!');
    }

    // ─── 문제은행 퀴즈 시작 ─────────────────────────────────
    async function startBankQuiz() {
      const selected = bankQuestions.filter(q => selectedBankIds.has(q.id));
      if (selected.length === 0) { Toast.error('문제를 선택해주세요.'); return; }

      // 단일 문제: 기존 강사 제어 방식
      if (selected.length === 1) {
        bankQuizQueue = selected;
        bankQuizCurrentIdx = 0;
        await startQueuedQuiz();
        return;
      }

      // 다중 문제: 배치 모드 (학생 자율 진행)
      isBatchMode = true;
      batchSessionIds = [];
      const quizSet = [];

      for (const q of selected) {
        const globalTimeLimit = parseInt(document.getElementById('timeLimit').value) || 30;
        const quizRes = await API.post('/api/quizzes', {
          course_id: courseId, type: q.type, question: q.question,
          options: q.options, answer: q.answer,
          time_limit: globalTimeLimit, source: 'bank',
        });
        if (!quizRes || !quizRes.success) { Toast.error('퀴즈 생성 실패'); isBatchMode = false; return; }

        const sessionRes = await API.post('/api/quiz-sessions', {
          quiz_id: quizRes.data.id, course_id: courseId, suppress_socket: true,
        });
        if (!sessionRes || !sessionRes.success) { Toast.error('세션 시작 실패'); isBatchMode = false; return; }

        batchSessionIds.push(sessionRes.data.id);
        quizSet.push({
          sessionId: sessionRes.data.id,
          type: q.type,
          question: q.question,
          options: q.options,
          timeLimit: globalTimeLimit,
        });
      }

      // 학생에게 전체 문제 세트 한 번에 전달
      SocketClient.socket.emit('teacher:quiz-set-start', { courseId, quizSet });

      // 강사 활성 패널 표시
      const batchTimeLimit = parseInt(document.getElementById('timeLimit').value) || 30;
      showActivePanel(`퀴즈 세트 (${quizSet.length}문제 · 학생 자율 진행)`, 0, `${quizSet.length}문제`);
      startTimer(batchTimeLimit);
      document.getElementById('endQuizBtn').style.display = '';
      document.getElementById('nextQuizBtn').style.display = 'none';
      Toast.success(`퀴즈 시작! (${quizSet.length}문제 - 학생 자율 진행)`);
    }

    async function startQueuedQuiz() {
      const q = bankQuizQueue[bankQuizCurrentIdx];

      // 문제은행 항목을 quizzes 테이블에 등록 후 세션 시작 (questions/quizzes는 별개 테이블)
      const globalTimeLimit = parseInt(document.getElementById('timeLimit').value) || 30;
      const quizRes = await API.post('/api/quizzes', {
        course_id: courseId, type: q.type, question: q.question,
        options: q.options, answer: q.answer,
        time_limit: globalTimeLimit, source: 'bank',
      });
      if (!quizRes || !quizRes.success) { Toast.error('퀴즈 생성 실패'); return; }

      const sessionRes = await API.post('/api/quiz-sessions', {
        quiz_id: quizRes.data.id, course_id: courseId,
      });
      if (!sessionRes || !sessionRes.success) { Toast.error('세션 시작 실패'); return; }

      activeSessionId = sessionRes.data.id;
      startTimer(globalTimeLimit);

      const total = bankQuizQueue.length;
      const progress = total > 1 ? `${bankQuizCurrentIdx + 1}/${total}` : '';
      showActivePanel(q.question, 0, progress);

      document.getElementById('endQuizBtn').style.display = '';
      document.getElementById('nextQuizBtn').style.display = 'none';

      const msg = total > 1
        ? `퀴즈 시작! (${bankQuizCurrentIdx + 1}/${total})`
        : '퀴즈가 시작되었습니다!';
      Toast.success(msg);
    }

    async function startNextQuiz() {
      bankQuizCurrentIdx++;
      await startQueuedQuiz();
    }

    // ─── 퀴즈 종료 ──────────────────────────────────────────
    async function endQuiz() {
      // 배치 모드 종료
      if (isBatchMode) {
        isBatchMode = false;
        for (const sid of batchSessionIds) {
          await API.put(`/api/quiz-sessions/${sid}`);
        }
        SocketClient.socket.emit('teacher:quiz-set-end', { courseId });
        // 결과 표시
        const container = document.getElementById('quizResults');
        container.innerHTML = '';
        const endedBatchIds = [...batchSessionIds];
        for (const sid of endedBatchIds) {
          await showResults(sid, true);
        }
        // 학생별 종합 통계 (마지막 제출 시간순)
        summarySessionIds = endedBatchIds;
        container.innerHTML += buildStudentSummary(endedBatchIds, 'time');
        document.getElementById('activeQuizPanel').style.display = 'none';
        batchSessionIds = [];
        bankQuizQueue = [];
        bankQuizCurrentIdx = 0;
        document.querySelector('[data-tab="results"]').click();
        return;
      }

      if (!activeSessionId) return;

      clearInterval(timerInterval);
      const endedSessionId = activeSessionId;
      activeSessionId = null;

      await API.put(`/api/quiz-sessions/${endedSessionId}`);

      await showResults(endedSessionId);
      summarySessionIds = [endedSessionId];
      document.getElementById('quizResults').innerHTML +=
        buildStudentSummary([endedSessionId], 'time');

      // 결과 탭으로 이동
      document.querySelector('[data-tab="results"]').click();

      const hasNext = bankQuizQueue.length > 0 && bankQuizCurrentIdx < bankQuizQueue.length - 1;
      if (hasNext) {
        // 다음 문제 버튼 표시
        document.getElementById('endQuizBtn').style.display = 'none';
        document.getElementById('timerDisplay').textContent = '-';
        document.getElementById('nextQuizBtn').textContent =
          `다음 문제 ▶ (${bankQuizCurrentIdx + 2}/${bankQuizQueue.length})`;
        document.getElementById('nextQuizBtn').style.display = '';
      } else {
        document.getElementById('activeQuizPanel').style.display = 'none';
        bankQuizQueue = [];
        bankQuizCurrentIdx = 0;
      }
    }

    // ─── 타이머 ─────────────────────────────────────────────
    function startTimer(seconds) {
      timerLeft = seconds;
      clearInterval(timerInterval);
      updateTimerDisplay();

      timerInterval = setInterval(() => {
        timerLeft--;
        updateTimerDisplay();
        if (timerLeft <= 0) {
          clearInterval(timerInterval);
          endQuiz();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const m = Math.floor(timerLeft / 60);
      const s = timerLeft % 60;
      const el = document.getElementById('timerDisplay');
      el.textContent = `${m}:${String(s).padStart(2, '0')}`;
      el.classList.toggle('urgent', timerLeft <= 10);
    }

    function showActivePanel(question, answered, progress) {
      document.getElementById('activeQuizPanel').style.display = 'block';
      document.getElementById('activeQuizQuestion').textContent = question;
      document.getElementById('answeredCount').textContent = answered;
      document.getElementById('quizProgress').textContent = progress || '';
    }

    function renderLiveDistribution(distribution) {
      const container = document.getElementById('liveDistribution');
      if (!distribution || distribution.length === 0) return;

      const total = distribution.reduce((sum, d) => sum + d.count, 0);
      container.innerHTML = distribution.map(d => `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="width:24px;font-weight:700;color:#fff">${d.answer}</span>
          <div style="flex:1;height:20px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden">
            <div style="width:${total > 0 ? Math.round(d.count/total*100) : 0}%;height:100%;background:rgba(255,255,255,.6);transition:width .3s"></div>
          </div>
          <span style="color:#fff;font-size:12px">${d.count}명 (${total > 0 ? Math.round(d.count/total*100) : 0}%)</span>
        </div>
      `).join('');
    }

    // ─── 퀴즈 결과 표시 ─────────────────────────────────────
    const resultDataMap = {}; // sessionId → API 응답 data

    async function showResults(sessionId, append = false) {
      const res = await API.get(`/api/quiz-sessions/${sessionId}/results`);
      if (!res || !res.success) return;

      resultDataMap[sessionId] = res.data;
      const container = document.getElementById('quizResults');
      const cardHtml = buildResultCard(sessionId, res.data);

      if (append) container.innerHTML += cardHtml;
      else container.innerHTML = cardHtml;
    }

    // 개별 문제 결과 카드 (분포 막대만, 학생 이름 없음)
    function buildResultCard(sessionId, data) {
      const { session, distribution, totalStudents, totalAnswered } = data;

      return `
        <div class="card" style="margin-bottom:var(--gap-md)" data-session-id="${sessionId}">
          <div class="card-header">
            <div class="card-title">${escHtml(session.question)}</div>
            <span class="badge badge-blue">${totalAnswered}/${totalStudents}명 응답</span>
          </div>
          <div>
            ${distribution.length > 0 ? distribution.map(d => `
              <div class="result-bar">
                <div class="result-bar-header">
                  <strong>${d.answer}</strong>
                  ${d.answer === session.correct_answer ? '<span class="badge badge-green">✅ 정답</span>' : ''}
                  <span class="text-sub" style="margin-left:auto">${d.count}명 (${d.percent}%)</span>
                </div>
                <div class="result-bar-track">
                  <div class="result-bar-fill ${d.answer === session.correct_answer ? 'correct' : ''}" style="width:${d.percent}%">
                    ${d.percent >= 10 ? d.percent + '%' : ''}
                  </div>
                </div>
              </div>
            `).join('') : '<p class="text-sub">응답 없음</p>'}
          </div>
        </div>
      `;
    }

    // 학생별 종합 통계 (마지막 제출 시각 기준 정렬)
    function buildStudentSummary(sessionIds, sortKey) {
      // sessionId → 문제 번호(0-based) 매핑
      const studentMap = {}; // name → { name, answers[idx], lastTime }

      for (let i = 0; i < sessionIds.length; i++) {
        const data = resultDataMap[sessionIds[i]];
        if (!data) continue;
        for (const sa of data.studentAnswers) {
          if (!studentMap[sa.name]) {
            studentMap[sa.name] = { name: sa.name, answers: Array(sessionIds.length).fill(null), lastTime: null };
          }
          studentMap[sa.name].answers[i] = sa;
          if (!studentMap[sa.name].lastTime || sa.answered_at > studentMap[sa.name].lastTime) {
            studentMap[sa.name].lastTime = sa.answered_at;
          }
        }
      }

      let students = Object.values(studentMap);
      students = sortStudents(students, sortKey);

      const isSortTime = sortKey === 'time';
      const isSortName = sortKey === 'name';
      const totalQ = sessionIds.length;

      return `
        <div class="card" id="studentSummaryCard" style="margin-top:var(--gap-lg)">
          <div class="card-header">
            <div class="card-title">📊 학생별 종합 결과</div>
            <div style="display:flex;gap:4px">
              <button class="btn btn-sm ${isSortTime ? 'btn-primary' : 'btn-secondary'}"
                onclick="resortSummary('time')">⏱ 시간순</button>
              <button class="btn btn-sm ${isSortName ? 'btn-primary' : 'btn-secondary'}"
                onclick="resortSummary('name')">가나다순</button>
            </div>
          </div>
          ${students.length === 0 ? '<p class="text-sub">응답한 학생이 없습니다.</p>' : `
          <table style="width:100%;border-collapse:collapse;font-size:var(--font-caption)">
            <thead>
              <tr style="background:var(--surface);border-bottom:2px solid var(--border)">
                <th style="padding:8px 10px;text-align:left;font-weight:600">이름</th>
                <th style="padding:8px 10px;text-align:center;font-weight:600">제출 시각</th>
                <th style="padding:8px 10px;text-align:center;font-weight:600">정답률</th>
                ${Array.from({length: totalQ}, (_, i) => `<th style="padding:8px 10px;text-align:center;font-weight:600">${i+1}번</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${students.map(st => {
                const correct = st.answers.filter(a => a && a.is_correct).length;
                const answered = st.answers.filter(a => a !== null).length;
                const pct = answered > 0 ? Math.round(correct / answered * 100) : 0;
                const pctColor = pct >= 70 ? '#10B981' : pct >= 40 ? '#F59E0B' : '#EF4444';
                return `
                  <tr style="border-bottom:1px solid var(--border)">
                    <td style="padding:8px 10px;font-weight:500">${escHtml(st.name)}</td>
                    <td style="padding:8px 10px;text-align:center;color:var(--text-sub)">${st.lastTime ? st.lastTime.slice(11,19) : '-'}</td>
                    <td style="padding:8px 10px;text-align:center">
                      <span style="font-weight:700;color:${pctColor}">${pct}%</span>
                      <span class="text-sub" style="margin-left:4px">(${correct}/${answered})</span>
                    </td>
                    ${st.answers.map(a => `
                      <td style="padding:8px 10px;text-align:center">
                        ${a ? (a.is_correct ? '<span class="badge badge-green">정답</span>' : '<span class="badge badge-red">오답</span>') : '<span class="text-sub">-</span>'}
                      </td>
                    `).join('')}
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
          `}
        </div>
      `;
    }

    function sortStudents(students, sortKey) {
      return [...students].sort((a, b) => {
        if (sortKey === 'name') return a.name.localeCompare(b.name, 'ko');
        if (!a.lastTime) return 1;
        if (!b.lastTime) return -1;
        return a.lastTime.localeCompare(b.lastTime);
      });
    }

    function resortSummary(sortKey) {
      if (!summarySessionIds.length) return;
      const card = document.getElementById('studentSummaryCard');
      if (!card) return;
      card.outerHTML = buildStudentSummary(summarySessionIds, sortKey);
    }

    // ─── 문제은행에 저장 ────────────────────────────────────
    async function saveToBank() {
      const question = document.getElementById('quizQuestion').value.trim();
      if (!question) { Toast.error('문제를 입력해주세요.'); return; }

      let subject = prompt('과목명을 입력하세요:');
      if (!subject) return;
      let chapter = prompt('챕터명을 입력하세요:');
      if (!chapter) return;

      let options = null;
      if (quizType === '4choice') {
        options = ['A','B','C','D'].map(l => document.getElementById(`opt${l}Text`).value.trim());
      }

      const res = await API.post('/api/questions', {
        course_id: courseId, subject, chapter, type: quizType, question,
        options, answer: selectedAnswer || '',
      });

      if (res && res.success) Toast.success('문제은행에 저장되었습니다.');
      else Toast.error('저장 실패');
    }

    // ─── 문제은행 탭 ────────────────────────────────────────
    async function loadBankSubjects() {
      if (!courseId) return;
      const res = await API.get(`/api/questions/subjects?course_id=${courseId}`);
      if (!res || !res.success) return;

      const select = document.getElementById('bankSubject');
      select.innerHTML = '<option value="">과목 선택</option>' +
        res.data.map(s => `<option>${escHtml(s)}</option>`).join('');
    }

    async function loadBankChapters() {
      const subject = document.getElementById('bankSubject').value;
      if (!subject) return;

      const res = await API.get(`/api/questions/chapters?course_id=${courseId}&subject=${encodeURIComponent(subject)}`);
      if (!res || !res.success) return;

      const select = document.getElementById('bankChapter');
      select.innerHTML = '<option value="">전체 챕터</option>' +
        res.data.map(c => `<option>${escHtml(c)}</option>`).join('');
    }

    async function loadBankQuestions() {
      const subject = document.getElementById('bankSubject').value;
      const chapter = document.getElementById('bankChapter').value;

      const params = new URLSearchParams({ course_id: courseId });
      if (subject) params.set('subject', subject);
      if (chapter) params.set('chapter', chapter);

      const res = await API.get(`/api/questions?${params}`);
      if (!res || !res.success) return;

      bankQuestions = res.data;
      selectedBankIds.clear();
      renderBankQuestions();
    }

    function renderBankQuestions() {
      const container = document.getElementById('bankQuestions');
      if (bankQuestions.length === 0) {
        container.innerHTML = '<p class="text-sub">문제가 없습니다.</p>';
        return;
      }

      container.innerHTML = bankQuestions.map(q => `
        <div class="question-bank-item ${selectedBankIds.has(q.id) ? 'selected' : ''}" onclick="toggleBankQuestion(${q.id})">
          <input type="checkbox" ${selectedBankIds.has(q.id) ? 'checked' : ''} onclick="event.stopPropagation()">
          <span class="badge badge-${q.type === 'ox' ? 'green' : 'blue'}" style="flex-shrink:0">${q.type === 'ox' ? 'OX' : '4지'}</span>
          <span style="flex:1">${escHtml(q.question)}</span>
          <span class="text-sub">${q.subject} / ${q.chapter}</span>
        </div>
      `).join('');
    }

    function toggleBankQuestion(id) {
      if (selectedBankIds.has(id)) selectedBankIds.delete(id);
      else selectedBankIds.add(id);
      renderBankQuestions();
    }

    function randomSelect() {
      const count = parseInt(document.getElementById('bankCount').value);
      selectedBankIds.clear();
      const shuffled = [...bankQuestions].sort(() => Math.random() - .5);
      shuffled.slice(0, count).forEach(q => selectedBankIds.add(q.id));
      renderBankQuestions();
    }

    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    init();
  </script>
</body>
</html>
