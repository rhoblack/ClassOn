<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassOn — 로그인</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--surface);
    }

    .login-box {
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      width: 360px;
      box-shadow: var(--shadow-md);
    }

    .login-logo {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .login-logo span { color: var(--primary); }

    .login-subtitle {
      text-align: center;
      color: var(--text-sub);
      font-size: var(--font-caption);
      margin-bottom: 40px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: var(--gap-md);
    }

    .error-msg {
      color: #ef4444;
      font-size: var(--font-caption);
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">Class<span>On</span></div>
    <div class="login-subtitle">강사용 교실 운영 플랫폼</div>

    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" id="password" class="input" placeholder="비밀번호 입력" autofocus>
      </div>
      <div class="error-msg" id="errorMsg"></div>
      <button type="submit" class="btn btn-primary btn-lg w-full" id="loginBtn">
        로그인
      </button>
    </form>

    <p style="text-align:center; margin-top:16px; font-size:12px; color:var(--text-sub)">
      초기 비밀번호: admin1234
    </p>
  </div>

  <script src="/js/common.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const btn  = document.getElementById('loginBtn');
    const err  = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('password').value;
      if (!pw) { err.textContent = '비밀번호를 입력해주세요.'; return; }

      btn.disabled = true;
      btn.textContent = '로그인 중...';

      const res = await API.post('/api/auth/login', { password: pw });

      if (res && res.success) {
        window.location.href = '/teacher/dashboard.html';
      } else {
        err.textContent = (res && res.message) || '로그인 실패';
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    });
  </script>
</body>
</html>
